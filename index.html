<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatter Delegate — Nominations</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 520px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-section h1 {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 8px;
        }

        .card {
            background: #111111;
            border: 1px solid #1a1a1a;
            border-radius: 16px;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #1d9bf0, transparent);
        }

        .card-header {
            margin-bottom: 32px;
        }

        .card-header h2 {
            font-size: 24px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 10px;
        }

        .card-header p {
            font-size: 15px;
            color: #888;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #aaa;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        label .required {
            color: #1d9bf0;
            margin-left: 2px;
        }

        input, textarea {
            width: 100%;
            padding: 14px 16px;
            background: #0a0a0a;
            border: 1px solid #222;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: #1d9bf0;
            box-shadow: 0 0 0 3px rgba(29, 155, 240, 0.1);
        }

        input::placeholder, textarea::placeholder {
            color: #444;
        }

        textarea {
            resize: vertical;
            min-height: 90px;
        }

        .hint {
            font-size: 12px;
            color: #555;
            margin-top: 6px;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #1d9bf0;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 8px;
            letter-spacing: 0.3px;
        }

        .submit-btn:hover {
            background: #1a8cd8;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .submit-btn:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            transform: none;
        }

        .success-state {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .success-state .check-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: rgba(29, 155, 240, 0.1);
            border: 2px solid #1d9bf0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 28px;
        }

        .success-state h3 {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 10px;
        }

        .success-state p {
            font-size: 15px;
            color: #888;
            line-height: 1.6;
        }

        .error-msg {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #ef4444;
        }

        .deadline {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: #555;
        }

        .deadline strong {
            color: #1d9bf0;
        }

        @media (max-width: 480px) {
            .card { padding: 28px 20px; }
            .card-header h2 { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <h1>Chatting Wizard</h1>
        </div>

        <div class="card">
            <div id="formView">
                <div class="card-header">
                    <h2>Chatter Delegate</h2>
                    <p>Nominate yourself or someone you trust to represent all chatters. One delegate will be elected by vote.</p>
                </div>

                <div id="errorMsg" class="error-msg"></div>

                <form id="nominationForm">
                    <div class="form-group">
                        <label>Your name <span class="required">*</span></label>
                        <input type="text" id="nominatorName" placeholder="Enter your name" required autocomplete="off">
                    </div>

                    <div class="form-group">
                        <label>Who do you nominate? <span class="required">*</span></label>
                        <input type="text" id="nomineeName" placeholder="Their name (or yours)" required autocomplete="off">
                        <div class="hint">You can nominate yourself</div>
                    </div>

                    <div class="form-group">
                        <label>Why would they be a good delegate?</label>
                        <textarea id="reason" placeholder="Optional — but it helps others understand your pick"></textarea>
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">Submit Nomination</button>
                </form>
            </div>

            <div id="successView" class="success-state">
                <div class="check-icon">&#10003;</div>
                <h3>Nomination submitted</h3>
                <p>Your voice matters. Voting will open once nominations close on Sunday.</p>
            </div>
        </div>

        <div class="deadline">Nominations close <strong>Sunday</strong></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://bnmrdlqqzxenyqjknqhy.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJubXJkbHFxenhlbnlxamtucWh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwODIxNzMsImV4cCI6MjA4NjY1ODE3M30.do4TDZdu84GA_Ek37qZi2ZPGqzRKJs9N80opQQP6V90';

        const form = document.getElementById('nominationForm');
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('errorMsg');
        const formView = document.getElementById('formView');
        const successView = document.getElementById('successView');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';

            const data = {
                nominator_name: document.getElementById('nominatorName').value.trim(),
                nominee_name: document.getElementById('nomineeName').value.trim(),
                reason: document.getElementById('reason').value.trim() || null
            };

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/delegate_nominations`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(data)
                });

                if (!res.ok) throw new Error('Failed to submit');

                formView.style.display = 'none';
                successView.style.display = 'block';
            } catch (err) {
                errorMsg.textContent = 'Something went wrong. Please try again.';
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Nomination';
            }
        });
    </script>
</body>
</html>
